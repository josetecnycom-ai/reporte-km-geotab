<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Reporte Tacógrafo v12.0</h3>
        <select id="selYear"><option value="2024">2024</option><option value="2025" selected>2025</option></select>
        <button id="btnRun">Generar Informe</button>
        <div id="status-bar" style="margin-top:10px; color:blue;">Listo.</div>
        <table>
            <thead><tr><th>Vehículo</th><th>Matrícula</th><th>Km Ini</th><th>Km Fin</th><th>Total</th></tr></thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
