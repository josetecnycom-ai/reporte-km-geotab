<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte TGD v7.0</title>
    <style>
        .wrap { font-family: sans-serif; padding: 20px; }
        .header { border-bottom: 3px solid #243665; padding-bottom: 10px; margin-bottom: 20px; }
        .controls { background: #f8f9fa; padding: 15px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #243665; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; }
        .status { font-weight: bold; margin-bottom: 15px; color: #243665; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        #btnRun { background: #243665; color: white; }
        #btnCsv { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <h1>⛽ Reporte KM Gasóleo (v7.0 - Filtro TGD Inteligente)</h1>
            <p style="color:#666; font-size: 13px;">Este reporte ignora los datos erróneos de centralita y busca los registros oficiales del tacógrafo.</p>
        </div>
        <div class="controls">
            <label>Ejercicio:</label>
            <select id="selYear"><option value="2024">2024</option><option value="2025" selected>2025</option></select>
            <button id="btnRun" class="btn">Generar Informe</button>
            <button id="btnCsv" class="btn" style="display:none;">Descargar Excel</button>
        </div>
        <div id="status-bar" class="status">Listo para procesar la flota.</div>
        <table>
            <thead>
                <tr>
                    <th>Vehículo</th>
                    <th>Matrícula</th>
                    <th style="text-align:right">Km Inicial (TGD)</th>
                    <th style="text-align:right">Km Final (TGD)</th>
                    <th style="text-align:right">Total Recorrido</th>
                </tr>
            </thead>
            <tbody id="tblData"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
