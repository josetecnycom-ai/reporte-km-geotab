<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte TGD v8.0</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .header { border-bottom: 2px solid #243665; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #243665; color: white; padding: 10px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 10px; }
        #status-bar { font-weight: bold; color: #243665; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
        #btnRun { background: #243665; color: white; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⛽ Reporte Anual TGD (v8.0 - MultiCall)</h1>
    </div>
    <div class="controls">
        Ejercicio: <select id="selYear"><option value="2024">2024</option><option value="2025" selected>2025</option></select>
        <button id="btnRun">Generar Informe</button>
        <button id="btnCsv" style="display:none; background:#28a745; color:white; border:none;">Exportar Excel</button>
    </div>
    <div id="status-bar">Esperando interacción...</div>
    <table id="tblData">
        <thead>
            <tr>
                <th>Vehículo</th>
                <th>Matrícula</th>
                <th style="text-align:right">Odo. Inicial (km)</th>
                <th style="text-align:right">Odo. Final (km)</th>
                <th style="text-align:right">Total Recorrido</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
