<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte Odómetro CAN</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .main-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        h2 { color: #004683; margin-top: 0; border-bottom: 2px solid #004683; padding-bottom: 10px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #004683; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #999; }
        #status-bar { padding: 12px; background: #e3f2fd; color: #004683; border-radius: 5px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #004683; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="main-card">
        <h2>🚚 Odómetro Oficial (CAN / TGD) - v18.0</h2>
        <div class="controls">
            <label><strong>Ejercicio Fiscal:</strong></label>
            <select id="selYear">
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
                <option value="2026">2026</option>
            </select>
            <button id="btnRun">Generar Informe</button>
        </div>

        <div id="status-bar">Esperando para iniciar análisis...</div>

        <table>
            <thead>
                <tr>
                    <th>Vehículo</th>
                    <th>Matrícula</th>
                    <th style="text-align:right">Odo. Inicial</th>
                    <th style="text-align:right">Odo. Final</th>
                    <th style="text-align:right">Total Recorrido</th>
                </tr>
            </thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
