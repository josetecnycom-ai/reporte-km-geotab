<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte Gasóleo Profesional v20.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f4f7f6; color: #333; }
        .main-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1200px; margin: auto; }
        
        /* SOLUCIÓN ICONO GIGANTE: Forzamos el tamaño de los SVG */
        .icon-fix { width: 32px !important; height: 32px !important; margin-right: 15px; fill: #2780e3; flex-shrink: 0; }
        .header-title { display: flex; align-items: center; border-bottom: 2px solid #e0e6eb; padding-bottom: 15px; margin-bottom: 25px; }
        .header-title h2 { margin: 0; font-size: 24px; color: #253746; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select { padding: 8px 12px; border-radius: 4px; border: 1px solid #caced1; outline: none; }
        
        .btn { padding: 10px 20px; border-radius: 4px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; }
        .btn-primary { background: #2780e3; color: white; }
        .btn-primary:hover { background: #1c65b2; }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; }
        
        .btn-success { background: #008767; color: white; display: none; }
        .btn-success:hover { background: #006b52; }
        .download-icon { width: 18px !important; height: 18px !important; margin-right: 8px; fill: white; }

        #status-bar { padding: 12px; background: #eef3f8; color: #253746; border-left: 4px solid #2780e3; border-radius: 4px; margin-bottom: 20px; }
        
        /* DISEÑO TABLA PREMIUM CON SEPARADORES CLAROS */
        .table-premium { width: 100%; border-collapse: collapse; border: 1px solid #caced1; border-radius: 4px; overflow: hidden; }
        .table-premium th { background: #f0f3f6; color: #5a6872; padding: 12px; text-align: left; border: 1px solid #caced1; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .table-premium td { padding: 10px 12px; border: 1px solid #caced1; font-size: 14px; }
        .table-premium tr:hover { background-color: #f8fbfc; }
        
        .num { text-align: right; }
        .total-col { font-weight: bold; color: #004683; background: #fafbfc; }
        .cell-name { width: 25%; }
        .cell-odo { width: 18%; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header-title">
            <svg class="icon-fix" viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M13,9V3.5L18.5,9H13Z" /></svg>
            <h2>Odómetro Oficial CAN / TGD (v20.0)</h2>
        </div>
        
        <div class="controls">
            <span>Ejercicio Fiscal:</span>
            <select id="selYear">
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
                <option value="2026">2026</option>
            </select>
            <button id="btnRun" class="btn btn-primary">Generar Informe</button>
            <button id="btnExport" class="btn btn-success">
                <svg class="download-icon" viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M12,19L8,15H10.5V12H13.5V15H16L12,19M13,9V3.5L18.5,9H13Z" /></svg>
                Descargar CSV
            </button>
        </div>

        <div id="status-bar">Listo para analizar la flota.</div>

        <table class="table-premium">
            <thead>
                <tr>
                    <th>Vehículo</th>
                    <th>Matrícula</th>
                    <th class="num">Odómetro Inicial (km)</th>
                    <th class="num">Odómetro Final (km)</th>
                    <th class="num">Total Recorrido</th>
                </tr>
            </thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
