<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Reporte Geotab</title>
    <style>
        body { font-family: "Arial", sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 40px; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1200px; margin: auto; }
        h1 { color: #243665; font-size: 26px; border-bottom: 3px solid #243665; padding-bottom: 15px; margin-top: 0; }
        .desc { color: #666; font-size: 14px; margin-bottom: 30px; }
        .controls { background: #f9f9f9; padding: 25px; border-radius: 8px; display: flex; gap: 20px; align-items: center; border: 1px solid #eee; margin-bottom: 30px; }
        select, button { padding: 12px 20px; border-radius: 6px; font-size: 14px; border: 1px solid #ccc; }
        button { background: #243665; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #1a284d; }
        #btnCsv { background: #28a745; }
        #status-bar { padding: 15px; color: #243665; font-weight: bold; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f3f5; color: #444; padding: 18px 15px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #ddd; }
        td { padding: 18px 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        tr:hover { background: #f8faff; }
        .num { text-align: right; font-family: monospace; }
        .total { font-weight: bold; color: #243665; background: #f1f5ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛽ Reporte Anual Tacógrafo (Gasóleo Profesional)</h1>
        <p class="desc">Cálculo de kilómetros reales basado en el primer y último registro de odómetro del tacógrafo procesado en el año.</p>
        
        <div class="controls">
            <label>Ejercicio:</label>
            <select id="selYear">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
            </select>
            <button id="btnRun">Generar Informe</button>
            <button id="btnCsv" style="display:none;">Exportar CSV</button>
        </div>

        <div id="status-bar" style="display:none;"></div>

        <table id="tblData">
            <thead>
                <tr>
                    <th style="width:25%">Vehículo</th>
                    <th style="width:15%">Matrícula</th>
                    <th style="width:20%; text-align:right">Odo. Inicial</th>
                    <th style="width:20%; text-align:right">Odo. Final</th>
                    <th style="width:20%; text-align:right">Total Recorrido</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
