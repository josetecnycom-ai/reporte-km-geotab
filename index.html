<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte TGD v10.0</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 8px; border-top: 5px solid #243665; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #243665; margin-top: 0; }
        .status { background: #d1ecf1; color: #0c5460; padding: 10px; border-radius: 4px; margin: 15px 0; border: 1px solid #bee5eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #243665; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        button { padding: 10px 15px; background: #243665; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #999; }
        #btnCsv { background: #28a745; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚚 Reporte Oficial TGD (v10.0)</h2>
        <p>Este informe extrae los datos directamente del tacógrafo, filtrando errores de centralita.</p>
        
        <div style="margin-bottom: 15px;">
            Ejercicio: 
            <select id="selYear">
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
            </select>
            <button id="btnRun">Generar Informe</button>
            <button id="btnCsv" style="display:none;">Descargar Excel</button>
        </div>

        <div id="status-bar" class="status">Listo para empezar.</div>

        <table id="tblData">
            <thead>
                <tr>
                    <th>Vehículo</th>
                    <th>Matrícula</th>
                    <th style="text-align:right">Odo Inicial</th>
                    <th style="text-align:right">Odo Final</th>
                    <th style="text-align:right">Total Recorrido</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
