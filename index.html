<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Reporte KM</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .header { background: #243665; color: white; padding: 10px; border-radius: 4px; }
        .container { margin-top: 20px; border: 1px solid #ccc; padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #eee; }
        button { background: #243665; color: white; padding: 10px; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="geotab-addin-content">
        <div class="header"><h1>Kilómetros Anuales Tacógrafo</h1></div>
        <div class="container">
            <label>Año: </label>
            <select id="selYear"><option value="2024">2024</option><option value="2025">2025</option></select>
            <button id="btnRun">Generar Reporte</button>
            <button id="btnCsv" style="display:none; background: #28a745;">Descargar CSV</button>
            <div id="status" style="margin-top:10px; color: blue;"></div>
            <table id="tblData">
                <thead><tr><th>Vehículo</th><th>Matrícula</th><th>Odo Inicial</th><th>Odo Final</th><th>Total KM</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
