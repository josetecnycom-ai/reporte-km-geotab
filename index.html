<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte TGD</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .header { border-bottom: 2px solid #243665; margin-bottom: 20px; }
        .controls { background: #eee; padding: 15px; margin-bottom: 20px; display: flex; gap: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #243665; color: white; padding: 10px; text-align: left; }
        td { border-bottom: 1px solid #ccc; padding: 10px; }
        .num { text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⛽ Reporte Gasóleo Profesional v5.0 (Ajuste TGD)</h1>
    </div>
    <div class="controls">
        <select id="selYear"><option value="2024">2024</option><option value="2025" selected>2025</option></select>
        <button id="btnRun">Generar Informe</button>
        <button id="btnCsv" style="display:none;">Descargar CSV</button>
    </div>
    <div id="status-bar">Listo para procesar.</div>
    <table id="tblData">
        <thead>
            <tr>
                <th>Vehículo</th>
                <th>Matrícula</th>
                <th class="num">Odo Inicial (km)</th>
                <th class="num">Odo Final (km)</th>
                <th class="num">Recorrido</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
