<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte Gasóleo Profesional v22.0</title>
</head>
<body>
    <div id="gasoleo-report-container">
        
        <style>
            #gasoleo-report-container {
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                background: white; padding: 30px; border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 1300px; /* Ensanchado un poco más */
                margin: 20px auto; color: #253746;
            }
            #gasoleo-report-container .header-title { display: flex; align-items: center; border-bottom: 2px solid #e0e6eb; padding-bottom: 15px; margin-bottom: 25px; }
            #gasoleo-report-container .header-title h2 { margin: 0; font-size: 24px; color: #253746; }
            #gasoleo-report-container .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
            #gasoleo-report-container select { padding: 8px 12px; border-radius: 4px; border: 1px solid #caced1; outline: none; font-size: 14px; }
            #gasoleo-report-container .btn { padding: 10px 20px; border-radius: 4px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; }
            #gasoleo-report-container .btn-primary { background: #2780e3; color: white; }
            #gasoleo-report-container .btn-primary:hover { background: #1c65b2; }
            #gasoleo-report-container .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; }
            #gasoleo-report-container .btn-success { background: #008767; color: white; display: none; }
            #gasoleo-report-container .btn-success:hover { background: #006b52; }
            #gasoleo-report-container #status-bar { padding: 12px; background: #eef3f8; border-left: 4px solid #2780e3; border-radius: 4px; margin-bottom: 20px; font-size: 15px; }
            
            #gasoleo-report-container .table-premium { width: 100%; border-collapse: collapse; border: 1px solid #caced1; border-radius: 4px; overflow: hidden; }
            #gasoleo-report-container .table-premium th, #gasoleo-report-container .table-premium td { padding: 10px 12px; border: 1px solid #caced1; font-size: 13px; text-align: left; }
            #gasoleo-report-container .table-premium th { background: #f0f3f6 !important; color: #5a6872; text-transform: uppercase; font-size: 11px; font-weight: bold; }
            #gasoleo-report-container .table-premium tr:nth-child(even) { background-color: #fcfcfc; }
            #gasoleo-report-container .table-premium tr:hover { background-color: #f0f7ff; }
            
            #gasoleo-report-container .num { text-align: right !important; }
            #gasoleo-report-container .total-col { font-weight: bold; color: #004683; background: #fafbfc; }
            #gasoleo-report-container .date-col { color: #5a6872; font-style: italic; white-space: nowrap; }
        </style>

        <div class="header-title">
            <svg width="32" height="32" style="margin-right: 15px; fill: #2780e3; flex-shrink: 0;" viewBox="0 0 24 24">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M13,9V3.5L18.5,9H13Z" />
            </svg>
            <h2>Auditoría de Odómetros (Gasóleo Profesional v22.0)</h2>
        </div>
        
        <div class="controls">
            <span>Ejercicio Fiscal:</span>
            <select id="selYear">
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
                <option value="2026">2026</option>
            </select>
            <button id="btnRun" class="btn btn-primary">Generar Informe</button>
            <button id="btnExport" class="btn btn-success">
                <svg width="18" height="18" style="margin-right: 8px; fill: white;" viewBox="0 0 24 24">
                    <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M12,19L8,15H10.5V12H13.5V15H16L12,19M13,9V3.5L18.5,9H13Z" />
                </svg>
                Descargar CSV
            </button>
        </div>

        <div id="status-bar">Listo para auditar las lecturas y sus fechas exactas.</div>

        <table class="table-premium">
            <thead>
                <tr>
                    <th>Vehículo</th>
                    <th>Matrícula</th>
                    <th>Sensor</th>
                    <th class="date-col">Fecha Inicial</th>
                    <th class="num">Odo. Inicial (km)</th>
                    <th class="date-col">Fecha Final</th>
                    <th class="num">Odo. Final (km)</th>
                    <th class="num">Total Recorrido</th>
                </tr>
            </thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
